<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>配当シミュレーター</title>

    <style>
        body {
            font-family: sans-serif;
            background: #f2f4f8;
            margin: 0;
            padding: 20px;
        }

        .app {
            max-width: 420px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        h1 {
            text-align: center;
            font-size: 24px;
        }

        p {
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background: #2563ed;
            color: white;
            margin-top: 20px;
        }

        #result {
            background: #eef4ff;
            padding: 16px;
            border-radius: 12px;
            line-height: 1.6;
        }
    </style>

</head>

<body>
    <div class="app">

        <h1>俺の配当シミュレーター</h1>

        <p>投資額を入力してください</p>
        <input id="amount" type="number" placeholder="例：1000000">

        <p>年利を入力してください（%）</p>
        <input id="rate" type="number" placeholder="例：4">

        <p>税率を入力してください（%）</p>
        <input id="tax" type="number" placeholder="例：20.315">

        <br><br>

        <button onclick="calculateDividend()">計算する</button>

        <h2>結果</h2>
        <p id="result">ここに結果が表示されます</p>

        <script>
            function calculateDividend() {
                let amount = document.getElementById("amount").value;
                let rate = document.getElementById("rate").value;
                let tax = document.getElementById("tax").value;

                let yearlyDividend = amount * (rate / 100);
                let afterTaxDividend = yearlyDividend * (1 - tax / 100);
                let monthlyDividend = afterTaxDividend / 12;

                document.getElementById("result").textContent =
                    "年間の税引後配当は " + Math.floor(afterTaxDividend) + " 円、毎月換算では " + Math.floor(monthlyDividend) + " 円です。";
            }
        </script>
    </div>
</body>

</html>
